<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Loja de Beats Ozzi Weird — Catálogo completo de beats exclusivos. Trap, Drill, Phonk e Dark Trap.">
  <title>Loja — Ozzi Weird Beats</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/loja.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="header" id="main-header">
    <div class="container header-inner">
      <a href="index.html" class="header-logo">
        <img src="assets/logo.png" alt="Ozzi Weird" class="header-logo-img">
        <span class="header-logo-text">Ozzi Weird</span>
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="loja.html" class="nav-link active">Loja</a>
        <a href="sobre.html" class="nav-link">Sobre</a>
        <a href="contato.html" class="nav-link">Contato</a>
      </nav>
      <a href="carrinho.html" class="header-cart" id="cart-icon" aria-label="Carrinho">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="cart-badge" id="cart-badge">0</span>
      </a>
    </div>
  </header>

  <!-- ========== LOJA ========== -->
  <main class="section">
    <div class="container">
      <!-- Header da loja -->
      <div class="loja-header">
        <h1 class="loja-title section-title">Todos os <span>Beats</span></h1>
        <p class="loja-subtitle">Encontre o beat perfeito para o seu projeto</p>
      </div>

      <!-- Filtros -->
      <div class="loja-filters">
        <div class="search-input-container">
          <svg viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35" stroke-linecap="round"/>
          </svg>
          <input type="text" id="search-input" class="search-input"
                 placeholder="Buscar por nome..." autocomplete="off">
        </div>
        <select id="genre-filter" class="filter-select">
          <option value="">Todos os gêneros</option>
          <!-- Populado via JS -->
        </select>
        <select id="bpm-filter" class="filter-select">
          <option value="">Qualquer BPM</option>
          <option value="80-120">80 – 120 BPM</option>
          <option value="120-140">120 – 140 BPM</option>
          <option value="140-160">140 – 160 BPM</option>
          <option value="160-200">160 – 200 BPM</option>
        </select>
        <button id="btn-toggle-favorites" class="btn-ghost" style="border: 1px solid var(--border-color); border-radius: var(--radius-md); display: flex; align-items: center; gap: 8px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          Favoritos
        </button>
      </div>

      <!-- Contagem -->
      <p class="beats-count" id="beats-count"></p>

      <!-- Grid de Beats -->
      <div class="beats-grid" id="beats-grid">
        <!-- Carregado via JS -->
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/ui-helpers.js"></script>
  <script src="js/player.js"></script>
  <script src="js/loja.js"></script>
</body>
</html>
